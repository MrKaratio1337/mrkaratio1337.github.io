<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja zabawa z HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <h1>Witaj na przykładowej stronie internetowej.</h1>
    </header>

    <div class="div-color">
        <br><br>
    </div>

    <div class="container">
        <p>Bawie się z HTML, CSS i JavaScript</p>
        <button id="myButton">Kliknij Mnie!</button>
    </div>

    <h2>Lista rzeczy do zrobienia</h2>
    <ul id="todoList">
        <li>Umyć naczynia</li>
        <li>Posprzątać pokój</li>
        <li>Przygotować obiad</li>
    </ul>

    <h2>Kalkulator</h2>
    <input type="numer" id="num1" placeholder="Liczba 1">
    <input type="numer" id="num2" placeholder="Liczba 2">
    <button id="addButton">Dodaj</button>
    <p id="result">Wynik: </p>

    <h2>Kontakt</h2>
    <form>
        <label for="name">Imię:</label>
        <input type="text" id="name" placeholder="Twoje imię">
        <label for="email">E-mail:</label>
        <input type="email" id="email" placeholder="Twój e-mail">
        <label for="message">Wiadomość:</label>
        <textarea id="message" rows="4" placeholder="Twoja wiadomość"></textarea>
        <button id="contactButton">Wyślij</button>
    </form>

    <br><br><br><br>

    <footer>
        Copyright &copy; 2023 MrKaratio1337
    </footer>

    <script src="script.js"></script>

</body>
</html>
